name: CI - Test y Merge a Early

on:
  push:
    branches: [ "main" ] # Se activa al subir cambios a main

jobs:
  test-and-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necesario para poder hacer el merge entre ramas

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Ejecutar Tests con Maven
        run: mvn test # Aquí es donde GitHub comprueba tus tests de JUnit

      - name: Merge automático a rama Early
        if: success() # Solo se ejecuta si el paso anterior (mvn test) ha terminado en verde
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout early
          git merge main
          git push origin early
